services:
  - type: web
    name: sku-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 --workers 2 app:app
    disk:
      name: sku-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/sku_manager.db
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false          # fill this in the Render dashboard
      - key: ALLOWED_DOMAINS
        value: mcaffeine.com
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: SMTP_FROM_NAME
        value: SKU Manager
