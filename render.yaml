services:
  - type: web
    name: sku-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: sku-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/sku_manager.db
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false          # fill this in the Render dashboard
      - key: ALLOWED_DOMAINS
        value: mcaffeine.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: SKU Manager
