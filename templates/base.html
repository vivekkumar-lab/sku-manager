<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SKU Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    [x-cloak] { display: none !important; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  {% block body %}{% endblock %}

  <!-- Toast notifications -->
  <div id="toasts" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
